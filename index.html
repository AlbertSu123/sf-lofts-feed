<style>
  :root{
    --ig-blue:#0095f6; --ig-red:#ed4956; --line:#dbdbdb; --ink:#0f1419; --muted:#737373;
    --card:#ffffff; --bg:#000;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;background:var(--bg);

  /* ===== TikTok vertical snap feed ===== */
  #feed{height:100dvh;overflow-y:scroll;scroll-snap-type:y mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
  #feed::-webkit-scrollbar{display:none;}
  .post{scroll-snap-align:start;scroll-snap-stop:always;min-height:100dvh;display:flex;align-items:flex-start;justify-content:center;
    padding:0;position:relative;}
  .card{width:100%;max-width:470px;background:var(--card);min-height:100dvh;display:flex;flex-direction:column;position:relative;}
  @media(min-width:600px){
    .post{align-items:center;padding:16px 0;}
    .card{min-height:auto;border:1px solid #2a2a2a;border-radius:14px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.6);}
  }
  /* rank chip (overlaid on photo) */
  .rank{position:absolute;top:10px;left:10px;z-index:6;background:rgba(0,0,0,.62);color:#fff;font-size:11px;font-weight:700;
    padding:4px 9px;border-radius:20px;backdrop-filter:blur(6px);letter-spacing:.3px;}
  .verifybar{position:absolute;top:40px;left:10px;z-index:6;background:#10b981;color:#fff;font-size:10px;font-weight:800;
    padding:4px 8px;border-radius:20px;letter-spacing:.4px;text-transform:uppercase;box-shadow:0 1px 4px rgba(0,0,0,.3);}
  /* ===== IG header ===== */
  .head{display:flex;align-items:center;gap:10px;padding:9px 12px;}
  .avatar{width:34px;height:34px;border-radius:50%;flex:none;padding:2px;
    background:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);}
  .avatar > div{width:100%;height:100%;border-radius:50%;background:#222 center/cover;border:2px solid #fff;
    display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:14px;}
  .uname{font-size:14px;font-weight:600;line-height:1.15;display:flex;align-items:center;gap:4px;}
  .uname .ck{width:14px;height:14px;}
  .uloc{font-size:11px;color:#262626;line-height:1.2;}
  .more{margin-left:auto;font-size:20px;color:#262626;letter-spacing:1px;cursor:pointer;}
  /* ===== media carousel ===== */
  .media{position:relative;background:#000;aspect-ratio:4/5;width:100%;overflow:hidden;}
  .track{display:flex;height:100%;overflow-x:auto;scroll-snap-type:x mandatory;scrollbar-width:none;-webkit-overflow-scrolling:touch;}
  .track::-webkit-scrollbar{display:none;}
  .slide{flex:0 0 100%;width:100%;height:100%;scroll-snap-align:center;position:relative;background:#111;}
  .slide img{width:100%;height:100%;object-fit:cover;display:block;}
  .slide iframe{width:100%;height:100%;border:0;display:block;}
  .maplbl{position:absolute;left:12px;bottom:12px;z-index:3;background:rgba(0,0,0,.66);color:#fff;font-size:12px;font-weight:600;
    padding:6px 11px;border-radius:18px;backdrop-filter:blur(4px);display:flex;align-items:center;gap:6px;pointer-events:none;}
  .counter{position:absolute;top:10px;right:10px;background:rgba(0,0,0,.6);color:#fff;font-size:12px;font-weight:700;
    padding:3px 9px;border-radius:14px;z-index:4;}
  .dots{position:absolute;left:0;right:0;bottom:9px;display:flex;justify-content:center;gap:4px;z-index:4;pointer-events:none;}
  .dots i{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.55);transition:.2s;}
  .dots i.on{background:#fff;transform:scale(1.15);}
  .arrow{position:absolute;top:50%;transform:translateY(-50%);width:30px;height:30px;border-radius:50%;
    background:rgba(255,255,255,.85);border:none;display:none;align-items:center;justify-content:center;cursor:pointer;z-index:5;font-size:15px;color:#222;}
  .arrow.l{left:8px;} .arrow.r{right:8px;}
  @media(min-width:600px){.media:hover .arrow{display:flex;}}
  /* ===== TikTok right rail overlay ===== */
  .rail{position:absolute;right:8px;bottom:14px;z-index:5;display:flex;flex-direction:column;align-items:center;gap:15px;}
  .rail button{background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;color:#fff;font-size:11px;font-weight:700;}
  .rail .ic{width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:24px;
    filter:drop-shadow(0 1px 3px rgba(0,0,0,.6));}
  .rail .ic.act{color:var(--ig-red);}
  .rail span{filter:drop-shadow(0 1px 2px rgba(0,0,0,.7));}
  /* ===== actions + body ===== */
  .acts{display:flex;align-items:center;gap:16px;padding:8px 12px 4px;font-size:24px;}
  .acts .sp{margin-left:auto;}
  .acts svg{width:25px;height:25px;cursor:pointer;}
  .likes{padding:0 12px;font-weight:600;font-size:14px;}
  .cap{padding:5px 12px 0;font-size:14px;line-height:1.4;}
  .cap b{font-weight:600;margin-right:5px;}
  .price{font-size:20px;font-weight:800;letter-spacing:-.3px;}
  .specs{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0 6px;}
  .chip{background:#f1f1f1;border-radius:16px;padding:4px 10px;font-size:12px;font-weight:600;color:#333;}
  .chip.hot{background:#fff0f0;color:#d33;}
  .feat{color:#262626;}
  .tags{color:#3a6ea5;}
  .listing{display:inline-flex;align-items:center;gap:6px;margin-top:9px;background:var(--ig-blue);color:#fff;
    text-decoration:none;font-weight:700;font-size:13px;padding:9px 14px;border-radius:9px;}
  .listing:active{opacity:.85;}
  .src{font-size:11px;color:var(--muted);margin-top:7px;}
  /* comments */
  .cmh{padding:12px 12px 2px;font-size:13px;color:var(--muted);font-weight:600;cursor:pointer;}
  .cmts.collapsed .cm:nth-child(n+3){display:none;}
  .cmts{padding:2px 12px 4px;display:flex;flex-direction:column;gap:11px;}
  .cm{display:flex;gap:9px;font-size:13.5px;line-height:1.35;}
  .cmav{width:30px;height:30px;border-radius:50%;flex:none;background:center/cover #ddd;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;}
  .cm .body b{font-weight:600;margin-right:5px;}
  .cm .meta{color:var(--muted);font-size:11px;margin-top:3px;display:flex;gap:12px;}
  .cm .meta span{font-weight:600;}
  .cm .hrt{margin-left:auto;color:#bbb;font-size:14px;align-self:flex-start;padding-top:3px;}
  .ts{padding:12px 12px 6px;color:var(--muted);font-size:10px;letter-spacing:.4px;text-transform:uppercase;}
  .addcm{display:flex;align-items:center;gap:10px;border-top:1px solid var(--line);padding:11px 12px;color:var(--muted);font-size:13px;margin-top:auto;}
  .addcm .e{font-size:18px;}
  /* swipe hint */
  .hint{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);z-index:30;color:#fff;font-size:12px;
    background:rgba(0,0,0,.5);padding:7px 14px;border-radius:20px;backdrop-filter:blur(6px);display:flex;align-items:center;gap:7px;
    animation:bob 1.6s ease-in-out infinite;pointer-events:none;}
  @keyframes bob{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-5px)}}
  .wm{position:absolute;top:10px;left:50%;transform:translateX(-50%);z-index:6;color:#fff;font-weight:800;font-size:13px;
    letter-spacing:-.2px;pointer-events:none;text-shadow:0 1px 5px rgba(0,0,0,.7);}
  .wm b{color:#fe2c55;}
</style>

const BEDROOM_BUDGET_LIMIT=2500;
function numericPrice(apt){
  const m=String(apt.price||"").match(/\$([\d,]+)/);
  return m?Number(m[1].replace(/,/g,"")):null;
}
function budgetBedroomCount(apt){
  if(apt.budgetBedrooms) return apt.budgetBedrooms;
  const specText=(apt.specs||[]).map(s=>s.t).join(" ");
  const m=specText.match(/(\d+(?:\.\d+)?)\s*bd/i);
  return m?Number(m[1]):null;
}
function pricePerBedroom(apt){
  const price=numericPrice(apt);
  const beds=budgetBedroomCount(apt);
  return price&&beds?price/beds:null;
}
function withinBedroomBudget(apt){
  const ppb=pricePerBedroom(apt);
  return ppb===null||ppb<=BEDROOM_BUDGET_LIMIT;
}

const feed=document.getElementById('feed');

function slideHTML(s, apt){
  if(s==="__MAP__"){
    const q=encodeURIComponent(apt.mapq);
    return `<div class="slide"><iframe loading="lazy" referrerpolicy="no-referrer-when-downgrade" src="https://www.google.com/maps?q=${q}&z=15&output=embed"></iframe><div class="maplbl">📍 ${apt.location.split('·')[0].trim()}</div></div>`;
  }
  return `<div class="slide"><img loading="lazy" referrerpolicy="no-referrer" src="${s}" alt="apartment photo"></div>`;
}

function postHTML(apt, idx){
  const specs=apt.specs.map(s=>`<span class="chip ${s.hot?'hot':''}">${s.t}</span>`).join('');
  const slides=apt.photos.map(p=>slideHTML(p,apt)).join('');
  const dots=apt.photos.map((_,i)=>`<i class="${i===0?'on':''}"></i>`).join('');
  const comments=apt.comments.map(cm=>`
    <div class="cm">
      <div class="cmav" style="background:hsl(${(cm.u.length*47)%360} 55% 55%)">${cm.i}</div>
      <div class="body"><b>${cm.u}</b>${cm.c}
        <div class="meta"><span>${cm.t}</span><span>${cm.l} likes</span><span>Reply</span></div>
      </div>
      <div class="hrt">♡</div>
    </div>`).join('');
  const feats=apt.features.split('\n').map(f=>`<div class="feat">${f}</div>`).join('');
  return `
  <section class="post">
    <div class="card">
      <div class="head">
        <div class="avatar"><div>${apt.initials}</div></div>
        <div>
          <div class="uname">${apt.handle} ${apt.verified?CHECK:''}</div>
          <div class="uloc">${apt.location}</div>
        </div>
        <div class="more">⋯</div>
      </div>

      <div class="media" data-n="${apt.photos.length}">
        <div class="rank">${apt.rank}</div>
        <div class="wm">Loft<b>Tok</b></div>
        <div class="counter">1/${apt.photos.length}</div>
        <div class="track">${slides}</div>
        <div class="dots">${dots}</div>
        <button class="arrow l">‹</button><button class="arrow r">›</button>
        <div class="rail">
          <button><span class="ic" data-like>${HEART}</span><span data-likecount>${apt.likes}</span></button>
          <button><span class="ic">${COMMENT}</span><span>${apt.comments.length}</span></button>
          <button><span class="ic">${SAVE}</span><span>Save</span></button>
          <button><span class="ic">${SHARE}</span><span>Share</span></button>
        </div>
      </div>

      <div class="cap" style="padding-top:10px">
        <div class="price">${apt.price}</div>
        <div class="specs">${specs}</div>
        <span><b>${apt.handle}</b>${apt.caption}</span>
        <div style="margin-top:8px">${feats}</div>
        <div class="tags" style="margin-top:8px">${apt.tags}</div>
        <a class="listing" href="${apt.link}" target="_blank" rel="noopener">🔗 ${apt.linktext}</a>
        <div class="src" style="${apt.vstat==='unconf'?'color:#c47f17;font-weight:600':'color:#0a8a3f;font-weight:600'}">${apt.vstat==='unconf'?'⚠ Availability unconfirmed — reconfirm before contacting':`✓ Availability checked ${apt.checked||'6/1'}`}</div>
        <div class="src">${apt.source}</div>
      </div>
      <div class="cmh" data-cmtoggle>View all ${apt.comments.length} comments</div>
      <div class="cmts collapsed">${comments}</div>
      <div class="ts">Listed today</div>
      <div class="addcm"><span class="e">☺</span> Add a comment…</div>
    </div>
  </section>`;
}

feed.innerHTML = ALL.map(postHTML).join('');

// carousel logic per post
document.querySelectorAll('.media').forEach(media=>{
  const track=media.querySelector('.track');
  const counter=media.querySelector('.counter');
  const dots=[...media.querySelectorAll('.dots i')];
  const n=+media.dataset.n;
  const upd=()=>{
    const i=Math.round(track.scrollLeft/track.clientWidth);
    counter.textContent=`${i+1}/${n}`;
    dots.forEach((d,k)=>d.classList.toggle('on',k===i));
  };
  track.addEventListener('scroll',()=>requestAnimationFrame(upd),{passive:true});
  media.querySelector('.arrow.l').addEventListener('click',()=>track.scrollBy({left:-track.clientWidth,behavior:'smooth'}));
  media.querySelector('.arrow.r').addEventListener('click',()=>track.scrollBy({left:track.clientWidth,behavior:'smooth'}));
});

// like toggle (rail + double tap)
document.querySelectorAll('.media').forEach(media=>{
  const railLike=media.querySelector('[data-like]');
  if(railLike) railLike.parentElement.addEventListener('click',()=>railLike.classList.toggle('act'));
});

// collapsible comments
document.querySelectorAll('[data-cmtoggle]').forEach(h=>{
  const list=h.nextElementSibling;
  const total=list.querySelectorAll('.cm').length;
  h.addEventListener('click',()=>{
    const collapsed=list.classList.toggle('collapsed');
    h.textContent=collapsed?`View all ${total} comments`:'Hide comments';
  });
});

// hide swipe hint after first scroll
feed.addEventListener('scroll',()=>{const h=document.getElementById('hint');if(h)h.style.display='none';},{once:true});
</script>
</body>
</html>
